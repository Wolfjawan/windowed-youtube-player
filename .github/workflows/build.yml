name: Build and release Windows app

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0
        required: true
        default: v0.1.0
        type: string

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained Windows app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null

          dotnet publish src/WindowedYouTubePlayer/WindowedYouTubePlayer.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:ContinuousIntegrationBuild=true `
            --output artifacts/win-x64

      - name: Package Windows build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path artifacts/win-x64/* `
            -DestinationPath artifacts/WindowedYouTubePlayer-win-x64.zip `
            -Force

          $hash = (Get-FileHash artifacts/WindowedYouTubePlayer-win-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  WindowedYouTubePlayer-win-x64.zip" | Set-Content artifacts/WindowedYouTubePlayer-win-x64.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowedYouTubePlayer-win-x64
          path: |
            artifacts/WindowedYouTubePlayer-win-x64.zip
            artifacts/WindowedYouTubePlayer-win-x64.sha256
          if-no-files-found: error

      - name: Select release version
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.version }}"
          } else {
            $tag = "v0.1.${{ github.run_number }}"
          }

          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }

          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create or update GitHub Release
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if (gh release view "$env:RELEASE_TAG" --repo "${{ github.repository }}" 2>$null) {
            gh release upload "$env:RELEASE_TAG" `
              artifacts/WindowedYouTubePlayer-win-x64.zip `
              artifacts/WindowedYouTubePlayer-win-x64.sha256 `
              --repo "${{ github.repository }}" `
              --clobber
          } else {
            gh release create "$env:RELEASE_TAG" `
              artifacts/WindowedYouTubePlayer-win-x64.zip `
              artifacts/WindowedYouTubePlayer-win-x64.sha256 `
              --repo "${{ github.repository }}" `
              --target "${{ github.sha }}" `
              --title "Windowed YouTube Player $env:RELEASE_TAG" `
              --generate-notes `
              --latest
          }
