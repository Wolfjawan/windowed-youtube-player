name: Build and release Windows app

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0
        required: true
        default: v0.1.0
        type: string
      create_release:
        description: Create a GitHub Release
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore WindowedYouTubePlayer.sln

      - name: Build
        run: dotnet build WindowedYouTubePlayer.sln --configuration Release --no-restore

      - name: Publish self-contained app
        shell: pwsh
        run: ./scripts/publish.ps1

      - name: Package release ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/win-x64/* -DestinationPath artifacts/WindowedYouTubePlayer-win-x64.zip -Force
          $hash = (Get-FileHash artifacts/WindowedYouTubePlayer-win-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  WindowedYouTubePlayer-win-x64.zip" | Set-Content artifacts/WindowedYouTubePlayer-win-x64.sha256

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowedYouTubePlayer-win-x64
          path: |
            artifacts/WindowedYouTubePlayer-win-x64.zip
            artifacts/WindowedYouTubePlayer-win-x64.sha256
          if-no-files-found: error

      - name: Select release tag
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "RELEASE_TAG=${{ inputs.version }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            "RELEASE_TAG=${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$env:RELEASE_TAG" `
            artifacts/WindowedYouTubePlayer-win-x64.zip `
            artifacts/WindowedYouTubePlayer-win-x64.sha256 `
            --repo "${{ github.repository }}" `
            --target "${{ github.sha }}" `
            --title "Windowed YouTube Player $env:RELEASE_TAG" `
            --generate-notes
