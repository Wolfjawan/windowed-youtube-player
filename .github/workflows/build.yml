name: Build and release Windows app

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.1
        required: true
        default: v0.1.1
        type: string

permissions:
  contents: write

concurrency:
  group: windowed-youtube-player-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish self-contained Windows x64 app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          dotnet publish src/WindowedYouTubePlayer/WindowedYouTubePlayer.csproj \
            --configuration Release \
            --runtime win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:ContinuousIntegrationBuild=true \
            -p:EnableWindowsTargeting=true \
            --output artifacts/win-x64 2>&1 | tee artifacts/build.log

      - name: Package Windows build
        shell: bash
        run: |
          cd artifacts/win-x64
          zip -r ../WindowedYouTubePlayer-win-x64.zip .
          cd ..
          sha256sum WindowedYouTubePlayer-win-x64.zip > WindowedYouTubePlayer-win-x64.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowedYouTubePlayer-win-x64
          path: |
            artifacts/WindowedYouTubePlayer-win-x64.zip
            artifacts/WindowedYouTubePlayer-win-x64.sha256
            artifacts/build.log
          if-no-files-found: error

      - name: Select release version
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.version }}"
          else
            tag="v0.1.1"
          fi

          if [[ "$tag" != v* ]]; then
            tag="v$tag"
          fi

          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

      - name: Create or update GitHub Release
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              artifacts/WindowedYouTubePlayer-win-x64.zip \
              artifacts/WindowedYouTubePlayer-win-x64.sha256 \
              --repo "${{ github.repository }}" \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              artifacts/WindowedYouTubePlayer-win-x64.zip \
              artifacts/WindowedYouTubePlayer-win-x64.sha256 \
              --repo "${{ github.repository }}" \
              --target "${{ github.sha }}" \
              --title "Windowed YouTube Player $RELEASE_TAG" \
              --generate-notes
          fi
